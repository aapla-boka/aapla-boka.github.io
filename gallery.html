<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Photos | Aapla Boka</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FDFBF7; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .back-link { color: #800000; text-decoration: none; font-weight: bold; }
        h1 { font-family: 'Noto Serif Devanagari', serif; color: #800000; margin: 10px 0; }
        h2 { font-family: 'Noto Serif Devanagari', serif; color: #555; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 40px; }
        
        .random-btn { 
            background: #800000; color: white; border: none; padding: 8px 16px; 
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .random-btn:hover { opacity: 0.9; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .grid img, .grid video { 
            width: 100%; height: 250px; object-fit: cover; border-radius: 10px; 
            cursor: pointer; transition: transform 0.2s; background: #000;
        }
        .grid img:hover, .grid video:hover { transform: scale(1.02); }

        .fullscreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .fullscreen img, .fullscreen video { max-width: 90%; max-height: 80%; border-radius: 5px; }
        .fullscreen p { color: white; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .close-hint { color: #aaa; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-flex">
            <a href="index.html" class="back-link">&larr; Back Home</a>
            <button class="random-btn" onclick="openRandom()">🎲 Random Boka</button>
        </div>
        
        <h1>चित्रशाळा (Gallery)</h1>

        <h2>छायाचित्रे (Photos)</h2>
        <div class="grid" id="photoGrid">
            <img src="photos/boka_sitting.jpg" alt="boka sitting" onclick="fullscreen(event)">
            <img src="photos/boka back.jpg" alt="boka showing his back" onclick="fullscreen(event)">
            <img src="photos/boka sleep6.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep7.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep8.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep9.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep10.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka stand5.jpg" alt="boka standing" onclick="fullscreen(event)">
            <img src="photos/boka sit4.jpg" alt="boka sitting" onclick="fullscreen(event)">
            <img src="photos/boka stand 3.jpg" alt="boka standing" onclick="fullscreen(event)">
            <img src="photos/boka stand4.png" alt="boka standing" onclick="fullscreen(event)">
            <img src="photos/boka_lisa.jpg" alt="boka lisa" onclick="fullscreen(event)">
            <img src="photos/boka_eating.jpg" alt="boka eating" onclick="fullscreen(event)">
            <img src="photos/boka.jpg" alt="boka" onclick="fullscreen(event)">
            <img src="photos/boka eating1.jpg" alt="boka eating" onclick="fullscreen(event)">
            <img src="photos/boka eating2.jpg" alt="boka eating" onclick="fullscreen(event)">
            <img src="photos/boka goodboy.jpg" alt="boka goodboy" onclick="fullscreen(event)">
            <img src="photos/boka large.jpg" alt="boka large" onclick="fullscreen(event)">
            <img src="photos/boka sleep1.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep2.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep3.jpg" alt="boka sleeping" onclick="fullscreen(event)">
            <img src="photos/boka sleep4.jpg" alt="boka tree" onclick="fullscreen(event)">
            <img src="photos/boka standing.jpg" alt="boka standing" onclick="fullscreen(event)">
            <img src="photos/boka yoga.jpg" alt="boka yoga" onclick="fullscreen(event)">
        </div>

        <h2>चलचित्रे (Videos)</h2>
        <div class="grid" id="videoGrid">
            <video src="photos/boka eating vid1.mp4" muted loop onclick="fullscreen(event)"></video>
            <video src="photos/boka eating vid3.mp4" muted loop onclick="fullscreen(event)"></video>
            <video src="photos/boka meow vid2.mp4" muted loop onclick="fullscreen(event)"></video>
        </div>
    </div>

    <script>
        window.fullscreen = (event) => {
            const overlay = document.createElement('div');
            overlay.classList.add('fullscreen');

            const target = event.target;
            const isVideo = target.tagName.toLowerCase() === 'video';

            const caption = document.createElement('p');
            caption.innerText = isVideo ? "Boka in Motion" : (target.alt || "Boka Photo");
            overlay.appendChild(caption);

            if (isVideo) {
                const video = document.createElement('video');
                video.src = target.src;
                video.controls = true; video.autoplay = true;
                overlay.appendChild(video);
            } else {
                const image = document.createElement('img');
                image.src = target.src;
                overlay.appendChild(image);
            }

            const hint = document.createElement('div');
            hint.className = 'close-hint';
            hint.innerText = "Click background to return to site";
            overlay.appendChild(hint);

            document.body.appendChild(overlay);

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.remove();
            });

            document.addEventListener('keydown', function escListener(e) {
                if (e.key === 'Escape') {
                    overlay.remove();
                    document.removeEventListener('keydown', escListener);
                }
            });
        }

        // Random logic: Pick an element and simulate a click on it
        function openRandom() {
            const allMedia = document.querySelectorAll('.grid img, .grid video');
            const randomItem = allMedia[Math.floor(Math.random() * allMedia.length)];
            const fakeEvent = { target: randomItem };
            window.fullscreen(fakeEvent);
        }
    </script>
</body>
</html>
